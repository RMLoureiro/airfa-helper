# ── Production (VPS / Dokploy) ────────────────────────────────────────────────
# Prerequisites:
#   1. In Dokploy UI: Databases → Create → PostgreSQL. Copy the connection string.
#   2. Set DATABASE_URL in the env vars below with that connection string.
#   3. On first deploy set RUN_SEED=true to create the initial admin account.
#      Set it back to false after the first start to avoid re-seeding on restart.

services:
  backend:
    build: ../backend
    restart: always
    volumes:
      - ../files/uploads:/app/uploads
    environment:
      # Container timezone (affects date.today() and local-time logic)
      TZ: ${TZ:-Europe/Lisbon}
      # Provided by Dokploy's managed PostgreSQL instance
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      # Seed control — RUN_SEED=true on first deploy only (creates super admin)
      RUN_SEED: ${RUN_SEED:-false}
      # Super admin account (used when RUN_SEED=true)
      SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME:-superadmin}
      SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME:-Super Admin}
      SEED_SUPER_ADMIN_PASSWORD: ${SEED_SUPER_ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # HTTPS router
      - "traefik.http.routers.airfa-backend.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.airfa-backend.entrypoints=websecure"
      - "traefik.http.routers.airfa-backend.tls.certresolver=letsencrypt"
      - "traefik.http.services.airfa-backend.loadbalancer.server.port=8000"
      - "traefik.docker.network=dokploy-network"
      # HTTP → HTTPS redirect
      - "traefik.http.middlewares.https-redirect.redirectscheme.scheme=https"
      - "traefik.http.middlewares.https-redirect.redirectscheme.permanent=true"
      - "traefik.http.routers.airfa-backend-http.rule=Host(`${API_DOMAIN}`)"
      - "traefik.http.routers.airfa-backend-http.entrypoints=web"
      - "traefik.http.routers.airfa-backend-http.middlewares=https-redirect"

  frontend:
    build:
      context: ../frontend
      target: prod              # runs next build then next start
      args:
        # NEXT_PUBLIC_* variables are baked in at build time — rebuild image to change URL
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: always
    environment:
      TZ: ${TZ:-Europe/Lisbon}
    depends_on:
      - backend
    networks:
      - dokploy-network
    labels:
      - "traefik.enable=true"
      # HTTPS router — bare domain (banda-airfa.pt)
      - "traefik.http.routers.airfa-frontend.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.airfa-frontend.entrypoints=websecure"
      - "traefik.http.routers.airfa-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.services.airfa-frontend.loadbalancer.server.port=3000"
      - "traefik.docker.network=dokploy-network"
      # www → bare redirect (www.banda-airfa.pt → banda-airfa.pt)
      - "traefik.http.middlewares.www-redirect.redirectregex.regex=^https://www\\.(.+)"
      - "traefik.http.middlewares.www-redirect.redirectregex.replacement=https://$${1}"
      - "traefik.http.middlewares.www-redirect.redirectregex.permanent=true"
      - "traefik.http.routers.airfa-frontend-www.rule=Host(`www.${APP_DOMAIN}`)"
      - "traefik.http.routers.airfa-frontend-www.entrypoints=websecure"
      - "traefik.http.routers.airfa-frontend-www.tls.certresolver=letsencrypt"
      - "traefik.http.routers.airfa-frontend-www.middlewares=www-redirect"
      - "traefik.http.routers.airfa-frontend-www.service=airfa-frontend"
      # HTTP → HTTPS redirect (banda-airfa.pt e www.banda-airfa.pt)
      - "traefik.http.routers.airfa-frontend-http.rule=Host(`${APP_DOMAIN}`) || Host(`www.${APP_DOMAIN}`)"
      - "traefik.http.routers.airfa-frontend-http.entrypoints=web"
      - "traefik.http.routers.airfa-frontend-http.middlewares=https-redirect"

networks:
  dokploy-network:
    external: true
