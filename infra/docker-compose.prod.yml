# ── Production (VPS) ──────────────────────────────────────────────────────────
# 1. Copy infra/.env.example to infra/.env and fill in all values.
# 2. On first deploy set RUN_SEED=true to create the initial admin account.
#    Set it back to false after the first start to avoid re-seeding on restart.
# Usage: cd infra && docker compose -f docker-compose.prod.yml up -d --build

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ../backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS}
      # Seed control
      RUN_SEED: ${RUN_SEED:-false}
      # Super admin account (used when RUN_SEED=true)
      # WARNING: all SEED_*_PASSWORD vars must be set explicitly — no weak defaults.
      SUPER_ADMIN_USERNAME: ${SUPER_ADMIN_USERNAME:-superadmin}
      SUPER_ADMIN_NAME: ${SUPER_ADMIN_NAME:-Super Admin}
      SEED_SUPER_ADMIN_PASSWORD: ${SEED_SUPER_ADMIN_PASSWORD}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD}
      SEED_REGULAR_PASSWORD: ${SEED_REGULAR_PASSWORD}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../frontend
      target: prod              # runs next build then next start
      args:
        # NEXT_PUBLIC_* variables are baked in at build time — rebuild image to change URL
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  db_data:
  uploads:
